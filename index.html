<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/themes/default.min.css" />

  <link rel="stylesheet" href="CSS_code/layout.css">
  <link rel="stylesheet" href="CSS_code/components.css">
  <link rel="stylesheet" href="CSS_code/modals.css">
</head>

<body>
  <div class="container_main">

    <section class="home">
      <div class="video_back">
        <video src="images/270983.mp4" autoplay loop muted></video>
      </div>

      <div class="content-wrapper">
        
        <div class="video_content">
          <h1 class="js-text-animation-color-1" id="secret-reset-title" style="cursor: pointer; user-select: none;">
            Super Awesome Notes
          </h1>
          
          <div class="btn-group-custom">
            <button class="btn_big" id="test">Правила</button>
            <button id="record-btn" class="btn_big">Добавить нотатку</button>
            <button class="btn_big" id="test-end">Хз шо це</button>
          </div>

          <div class="d-flex justify-content-center my-4">
            <div class="btn-group shadow" role="group" id="archive-tabs">
              <button type="button" class="btn btn-outline-light active px-4" data-tab="active">
                <i class="fas fa-sticky-note me-2"></i>Обычные
              </button>
              <button type="button" class="btn btn-outline-light px-4" data-tab="archived">
                <i class="fas fa-archive me-2"></i>Архив
              </button>
            </div>
          </div>
        </div>

        <div class="notes-container">
          <div class="row g-3" id="notes-grid"></div>
        </div>

      </div> </section>

  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>

  <script src="JS_code/storage.js"></script>
  <script src="JS_code/templates.js"></script>
  <script src="JS_code/main.js"></script>
  <script src="JS_code/notes.js"></script>

</body>
</html>
